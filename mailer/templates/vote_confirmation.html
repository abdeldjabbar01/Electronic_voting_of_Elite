<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            line-height: 1.6; 
            color: #41431B; 
            background: #F8F3E1;
            padding: 20px;
        }
        .email-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }
        .email-container { 
            background: #ffffff; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(65, 67, 27, 0.12);
            border: 2px solid #E3DBBB;
        }
        .header { 
            background: linear-gradient(135deg, #41431B 0%, #AEB784 100%); 
            color: #F8F3E1; 
            padding: 32px 24px; 
            text-align: center;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .content {
            padding: 32px 24px;
        }
        .success-banner {
            background: #E8F5E9;
            border-left: 4px solid #628141;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 24px;
        }
        .success-banner h2 {
            font-size: 16px;
            font-weight: 600;
            color: #2E5A1C;
            margin: 0;
        }
        .intro {
            font-size: 15px;
            color: #41431B;
            margin-bottom: 24px;
        }
        .vote-title {
            font-size: 18px;
            font-weight: 600;
            color: #41431B;
            margin-bottom: 24px;
            padding: 16px;
            background: #F8F3E1;
            border-radius: 8px;
            border-left: 4px solid #AEB784;
        }
        .details-card {
            background: #F8F3E1;
            border-radius: 10px;
            padding: 20px;
            margin: 24px 0;
            border: 1px solid #E3DBBB;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #E3DBBB;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            font-size: 13px;
            color: #AEB784;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .detail-value {
            font-size: 14px;
            font-weight: 500;
            color: #41431B;
        }
        .status-badge {
            color: #628141;
            font-weight: 600;
        }
        .notice {
            background: #F8F3E1;
            border-left: 4px solid #AEB784;
            padding: 16px;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #41431B;
            margin-top: 24px;
        }
        .footer {
            padding: 24px;
            background: #F8F3E1;
            text-align: center;
            border-top: 1px solid #E3DBBB;
        }
        .footer p {
            font-size: 13px;
            color: #AEB784;
            margin: 0;
        }
        .footer .brand {
            font-weight: 600;
            color: #41431B;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="header">
                <h1>Vote Confirmation</h1>
            </div>
            
            <div class="content">
                <div class="success-banner">
                    <h2>Your Vote Has Been Recorded</h2>
                </div>
                
                <p class="intro">Hello,</p>
                
                <div class="vote-title">
                    {vote_title}
                </div>
                
                <div class="details-card">
                    <div class="detail-row">
                        <span class="detail-label">Your Choice</span>
                        <span class="detail-value">{vote_choice}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Time</span>
                        <span class="detail-value">{timestamp}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Status</span>
                        <span class="detail-value status-badge">Confirmed</span>
                    </div>
                </div>
                
                <div class="notice">
                    <strong>Note:</strong> Your vote is anonymous and cannot be changed once submitted.
                </div>
            </div>
            
            <div class="footer">
                <p>Thank you for your participation</p>
                <p class="brand">SecureVote</p>
            </div>
        </div>
    </div>
</body>
</html>
