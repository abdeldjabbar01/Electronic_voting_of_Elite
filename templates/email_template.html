<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .election-title {
            background-color: #f5f5f5;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .code-box {
            background-color: #f9f9f9;
            border-left: 4px solid #007bff;
            padding: 12px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 18px;
        }
        .info {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Voting System</h2>
        </div>
        
        <p>Dear Voter,</p>
        
        <p>You have been registered to vote in:</p>
        <div class="election-title">{election_title}</div>
        
        <p><strong>Your voting codes:</strong></p>
        
        <div class="code-box">
            <strong>N1 Code:</strong> {n1_code}
        </div>
        
        <div class="code-box">
            <strong>N2 Code:</strong> {n2_code}
        </div>
        
        <div class="info">
            <strong>Election ID:</strong> {election_id}
        </div>
        
        <p>To vote, run: <code>python vote.py</code> and enter the details above.</p>
        
        <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">
        <p style="font-size: 12px; color: #777; text-align: center;">
            This is an automated message. Please do not reply.
        </p>
    </div>
</body>
</html>
